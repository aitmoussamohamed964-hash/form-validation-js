<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulaire d'inscription</title>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h3 class="mb-4 text-center">Formulaire d'inscription</h3>

    <form id="formInscription">

        <!-- Nom -->
        <div class="mb-3">
            <label for="nom" class="form-label">Nom</label>
            <input type="text" id="nom" class="form-control">
            <small class="text-danger"></small>
        </div>

        <!-- Prénom -->
        <div class="mb-3">
            <label for="prenom" class="form-label">Prénom</label>
            <input type="text" id="prenom" class="form-control">
            <small class="text-danger"></small>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control">
            <small class="text-danger"></small>
        </div>

        <!-- Mot de passe -->
        <div class="mb-3">
            <label for="password" class="form-label">Mot de passe</label>
            <input type="password" id="password" class="form-control">
            <small class="text-danger"></small>
        </div>

        <!-- Date de naissance -->
        <div class="mb-3">
            <label for="date" class="form-label">Date de naissance</label>
            <input type="date" id="date" class="form-control">
            <small class="text-danger"></small>
        </div>

        <!-- Genre -->
        <div class="mb-3">
            <label class="form-label">Genre</label><br>
            <input type="radio" name="genre" value="Homme"> Homme
            <input type="radio" name="genre" value="Femme" class="ms-3"> Femme
            <small class="text-danger d-block"></small>
        </div>

        <!-- Ville -->
        <div class="mb-3">
            <label for="ville" class="form-label">Ville</label>
            <select id="ville" class="form-select">
                <option value="">-- Choisir une ville --</option>
                <option value="Marrakech">Marrakech</option>
                <option value="Casablanca">Casablanca</option>
                <option value="Rabat">Rabat</option>
            </select>
            <small class="text-danger"></small>
        </div>

        <!-- Conditions -->
        <div class="mb-3 form-check">
            <input type="checkbox" id="conditions" class="form-check-input">
            <label for="conditions" class="form-check-label">J'accepte les conditions d'utilisation</label>
            <small class="text-danger d-block"></small>
        </div>

        <button type="submit" class="btn btn-primary">S'inscrire</button>
        <button type="reset" class="btn btn-secondary">Annuler</button>
    </form>

    <!-- Table to show users -->
    <div class="mt-4">
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Email</th>
                    <th>Mot de passe</th>
                    <th>Date</th>
                    <th>Genre</th>
                    <th>Ville</th>
                    <th>Conditions</th>
                </tr>
            </thead>
            <tbody id="table_body"></tbody>
        </table>
    </div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
