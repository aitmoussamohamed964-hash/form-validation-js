<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire d'inscription</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">

            <h3 class="mb-4 text-center">Formulaire d'inscription</h3>

            <form id="formInscription" action="inscription.php" method="POST">


                <div class="mb-3">

                    <label for="nom" class="form-label">Nom</label>

                    <input type="text" id="nom" name="nom" class="form-control">

                    <small class="text-danger"></small>

                </div>

                <div class="mb-3">

                    <label for="prenom" class="form-label">Prénom</label>

                    <input type="text" id="prenom" name="prenom" class="form-control">

                    <small class="text-danger"></small>

                </div>

                <div class="mb-3">

                    <label for="email" class="form-label">Email</label>

                    <input type="email" id="email" name="email" class="form-control">

                    <small class="text-danger"></small>

                </div>

                <div class="mb-3">

                    <label for="password" class="form-label">Mot de passe</label>

                    <input type="password" id="password" name="password" class="form-control">

                    <small class="text-danger"></small>

                </div>

                <div class="mb-3">

                    <label for="date" class="form-label">Date de naissance</label>

                    <input type="date" id="date" name="date" class="form-control">

                    <small class="text-danger"></small>

                </div>

                <div class="mb-3">

                    <label for="g" class="form-label">Genre</label><br>

                    <input type="radio" name="genre" value="Homme" id="g"> Homme

                    <input type="radio" name="genre" value="Femme" class="ms-3" id="g"> Femme

                </div>

                <div class="mb-3">

                    <label for='ville' class="form-label">Ville</label>

                    <select id="ville" name="ville" class="form-select">

                        <option value="">-- Choisir une ville --</option>

                        <option value="Marrakech">Marrakech</option>

                        <option value="Casablanca">Casablanca</option>

                        <option value="Rabat">Rabat</option>

                    </select>

                    <small class="text-danger"></small>

                </div>


                <!-- Conditions -->

                <div class="mb-3 form-check">

                    <input type="checkbox" id="conditions" class="form-check-input">

                    <label for="conditions" class="form-check-label">

                        J'accepte les conditions d'utilisation

                    </label>

                </div>

                <button type="submit" class="btn btn-primary">S'inscrire</button>

                <button type="reset" class="btn btn-secondary">Annuler</button>

            </form>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
